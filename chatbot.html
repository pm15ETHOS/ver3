<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHOS - 시나리오 시뮬레이터</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/app.js"></script>
    <style>
        .scenario-select {
            margin-bottom: 24px;
        }

        .scenario-select select {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: white;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        .chat-header {
            padding: 16px 20px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .turn-tracker {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tr-pill {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #e5e7eb;
            color: #6b7280;
        }

        .tr-pill.active {
            background: var(--primary);
            color: white;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .msg-row {
            display: flex;
            width: 100%;
            animation: slideUpFade 0.3s ease-out;
        }

        .msg-row.bot {
            justify-content: flex-start;
        }

        .msg-row.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .bot .bubble {
            background: #f3f4f6;
            color: #111827;
            border-top-left-radius: 4px;
        }

        .user .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .turn-divider {
            text-align: center;
            margin: 10px 0;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
        }

        .chat-input {
            padding: 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: var(--primary);
        }

        .chat-input button {
            padding: 0 20px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #sim-active {
            display: none;
        }

        #sim-result {
            display: none;
            text-align: center;
            padding: 40px;
        }

        /* Hint & Modal Styles */
        .hint-btn {
            background: #fff;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            margin-left: 10px;
        }

        .hint-btn:hover {
            background: #f0fdfa;
        }

        #hint-modal {
            display: none;
            position: absolute;
            bottom: 85px;
            right: 20px;
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            max-width: 320px;
            z-index: 50;
        }

        #hint-modal h4 {
            color: var(--primary);
            margin-bottom: 8px;
            margin-top: 0;
            font-size: 0.95rem;
        }

        #hint-modal p {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #4b5563;
            margin: 0;
        }

        #hint-modal .close-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #9ca3af;
        }



        /* Scenario Intro Card & Persona Card Styles */
        .intro-card {
            background: #f0f9ff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e0f2fe;
            animation: slideUpFade 0.4s ease-out;
        }

        .intro-card.persona {
            background: #fdf4ff;
            border-color: #fae8ff;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
        }

        .scenario-header .header-icon {
            background: var(--primary);
        }

        .persona-header .header-icon {
            background: #a855f7;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #111827;
        }

        .inner-content {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .scenario-main-title {
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .scenario-description {
            color: #4b5563;
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .desc-label {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .label-red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .label-blue {
            background: #e0f2fe;
            color: #0369a1;
        }

        .label-green {
            background: #dcfce7;
            color: #15803d;
        }

        .scenario-illustration {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
        }

        @keyframes slideUpFade {
            from {
                transform: translateY(10px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive adjustments for Chat */
        @media (max-width: 768px) {
            .chat-container {
                height: 500px;
            }
            .bubble {
                max-width: 85%;
            }
            #hint-modal {
                bottom: 80px;
                right: 10px;
                left: 10px;
                width: auto;
                max-width: none;
            }
        }
    </style>
</head>

<body>


    <div class="app-container">
        <div class="sidebar" id="sidebar"></div>
        <div class="main-area">
            <div class="topbar" id="topbar"></div>

            <div class="page-content">
                <h2 style="margin-bottom: 24px;">💬 시나리오 시뮬레이터</h2>

                <!-- Scenario Intro Phase -->
                <div id="sim-setup" class="card"
                    style="padding: 32px; animation: slideUpFade 0.4s ease-out; background: #fff;">
                    <div style="text-align:center; margin-bottom: 32px;">
                        <div
                            style="background:#e6fdf9; width:56px; height:56px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:var(--primary); font-size:1.8rem; margin-bottom:12px;">
                            🤖</div>
                        <h2 style="margin-bottom:4px; font-size: 1.6rem;">AI 윤리 교육 과정</h2>
                        <p style="color:#6b7280; font-size: 1rem;">시나리오 기반 윤리 설득 시뮬레이터</p>
                    </div>

                    <!-- Scenario Card -->
                    <div class="intro-card">
                        <div class="card-header scenario-header">
                            <div class="header-icon">📋</div>
                            <h3 class="card-title">시나리오 소개</h3>
                        </div>
                        <div class="inner-content">
                            <div id="intro-title" class="scenario-main-title">로딩 중...</div>
                            <div style="margin-bottom: 12px;">
                                <span class="desc-label label-red">실제 사건</span>
                                <p id="intro-realcase"
                                    style="font-size: 0.85rem; color: #ef4444; margin: 0; line-height: 1.4;"></p>
                            </div>
                            <!-- 인용 메시지 먼저 -->
                            <div style="margin-bottom: 16px; background:#f8fafc; border-left:3px solid var(--primary); border-radius:0 8px 8px 0; padding:14px 16px;">
                                <div id="intro-quote" style="font-size:0.9rem; color:#1e293b; line-height:1.7; white-space:pre-line;"></div>
                            </div>
                            <!-- 상황 설명 뒤에 -->
                            <div style="margin-bottom: 20px;">
                                <span class="desc-label label-blue">상황 소개</span>
                                <p id="intro-desc" class="scenario-description" style="margin: 0; white-space:pre-line;"></p>
                            </div>
                            <img id="intro-img" class="scenario-illustration" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="시나리오 일러스트"
                                onerror="this.style.display='none'">
                        </div>
                    </div>

                    <!-- Persona Card -->
                    <div class="intro-card persona">
                        <div class="card-header persona-header">
                            <div class="header-icon">👤</div>
                            <h3 class="card-title">페르소나 소개</h3>
                        </div>
                        <div class="inner-content">
                            <div style="display:flex; align-items:center; gap:16px; margin-bottom: 20px;">
                                <div id="intro-avatar"
                                    style="width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:1.4rem; font-weight:bold;">
                                </div>
                                <div>
                                    <div id="intro-name" style="font-weight:700; font-size:1.1rem; margin-bottom:2px;">
                                        불러오는 중...</div>
                                    <div id="intro-role" style="color:#6b7280; font-size:0.9rem;">-</div>
                                </div>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <span class="desc-label" style="background:#ede9fe; color:#6d28d9;">소개</span>
                                <p id="intro-bio" style="font-size: 0.9rem; color: #4b5563; margin: 6px 0 0; line-height: 1.6;"></p>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <span class="desc-label label-green">성격 유형</span>
                                <p id="intro-personality" style="font-size: 0.95rem; color: #4b5563; margin: 0;"></p>
                            </div>
                            <div style="margin-bottom: 20px;">
                                <div style="font-size:0.8rem; color:#6b7280; margin-bottom:4px;">현재 태도</div>
                                <div id="intro-attitude"
                                    style="color:#111827; font-weight:600; font-style:italic; font-size: 0.95rem; border-left: 3px solid #a855f7; padding-left: 12px;">
                                </div>
                            </div>
                            <div
                                style="background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:16px; font-size:0.9rem;">
                                <span
                                    style="color:#d97706; font-weight:bold; display:flex; align-items:center; gap:6px;">💡
                                    Hint</span>
                                <span id="intro-hint-summary"
                                    style="color:#92400e; margin-top:6px; display:inline-block; line-height: 1.4;">논리적
                                    설득과 구체적 사례를 통해 상대방의 태도를 변화시켜보세요.</span>
                            </div>

                            <!-- KISDI Connection Card -->
                            <div style="margin-top: 16px; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:16px; font-size:0.9rem;">
                                <span style="color:#166534; font-weight:bold; display:flex; align-items:center; gap:6px;">🔗 KISDI 연결</span>
                                <span id="intro-kisdi-summary" style="color:#15803d; margin-top:6px; display:inline-block; line-height: 1.4;">-</span>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary"
                        style="width:100%; padding:18px; font-size:1.15rem; border-radius:14px; font-weight: 700; box-shadow: 0 4px 12px rgba(0, 155, 132, 0.2);"
                        onclick="startSim()">대화 시작하기</button>
                </div>

                <!-- Active Chat Phase -->
                <div id="sim-active">
                    <div class="chat-container">
                        <div class="chat-header">
                            <div>
                                <b id="chat-title">시뮬레이션</b>
                            </div>
                            <div class="turn-tracker" id="turn-tracker">
                                <div class="tr-pill active" id="pill-T1">T1</div>
                                <div class="tr-pill" id="pill-T2">T2</div>
                                <div class="tr-pill" id="pill-T3">T3</div>
                                <div class="tr-pill" id="pill-T3.5">T3.5</div>
                                <div class="tr-pill" id="pill-T4">T4</div>
                                <div class="tr-pill" id="pill-T5">T5</div>
                                <button class="hint-btn" onclick="toggleHint()">💡 힌트 보기</button>
                            </div>
                        </div>

                        <div class="chat-body" id="chat-body"></div>

                        <div id="hint-modal">
                            <button class="close-btn" onclick="toggleHint()">×</button>
                            <h4>💡 이번 턴의 힌트</h4>
                            <p id="hint-text" style="margin-bottom: 20px;"></p>
                            <div id="ethics-hint-box"
                                style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #e5e7eb;">
                                <div class="desc-label label-red" style="font-size: 0.7rem;">핵심 윤리 포인트</div>
                                <p id="hint-ethics" style="font-size: 0.85rem; color: #4b5563; margin: 5px 0;"></p>
                                <div class="desc-label label-blue" style="font-size: 0.7rem;">KISDI 연결</div>
                                <p id="hint-kisdi" style="font-size: 0.85rem; color: #4b5563; margin: 5px 0;"></p>
                            </div>
                        </div>

                        <div class="chat-input" id="chat-input-area">
                            <input type="text" id="chat-msg" placeholder="논리적으로 설득해보세요..."
                                onkeypress="if(event.key==='Enter') sendMsg()">
                            <button id="send-btn" onclick="sendMsg()">전송</button>
                        </div>
                    </div>
                </div>

                <!-- Result Phase -->
                <div id="sim-result" class="card">
                    <h2 id="res-title" style="margin-bottom: 16px;">결과</h2>
                    <p id="res-desc" style="color:#6b7280; margin-bottom:24px;"></p>
                    <div id="res-hints" style="margin-bottom:20px; font-weight:600; font-size:0.95rem;"></div>
                    <div style="display:flex; justify-content:center; gap:16px;">
                        <button class="btn btn-secondary" onclick="location.reload()">🔄 다시 진행하기</button>
                        <button class="btn btn-primary" onclick="goSurvey()" id="go-survey-btn"
                            style="display:none;">만족도 조사 작성하기 →</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SCENARIOS = {
            "S01": {
                title: "SCENARIO 01 · 정보보호",
                name: "내부 정보 보호 (이현도)",
                personaName: "이현도",
                role: "사수 (시니어 개발자 3년차)",
                intro: "어젯밤 야근으로 기능을 끝낸 걸 내심 뿌듯해하는 사수. 팀에서 실력으로 인정받아온 만큼 자기 판단을 쉽게 굽히지 않는다. 후배가 진심으로 걱정해주는 건 알아채지만, 틀렸다고 몰아붙이는 순간 선임 자존심이 올라온다.",
                personality: "개발 실력 자부심 강함 · 속도 우선 · 보안은 \"담당 팀 일\"이라고 막연히 생각",
                realCase: "삼성전자 직원이 ChatGPT에 반도체 소스코드·회의록·측정 데이터를 입력해 외부 유출 (Bloomberg, 2023.04). 이후 삼성은 사내 AI 사용 전면 제한.",
                quote: "이현도 (10:23)\n\"야, 나 어젯밤에 이 기능 겨우 끝냈다. ChatGPT한테 우리 DB 스키마랑 API 키 통째로 붙여넣고 코드 짜달라고 했어. 어차피 ChatGPT는 입력 데이터 학습 안 한다고 약관에 나와 있잖아. 오늘 회의 때 데모 보여줄 수 있을 것 같아 👍\"",
                desc: "오전 10시 40분. 20분 뒤면 팀 전체 주간 회의가 잡혀 있다.\n당신이 코드 리뷰를 마치고 슬랙을 열었을 때, 사수 이현도의 DM이 와 있다.\n회의까지 20분. 이현도는 지금 발표 자료를 다듬고 있다.",
                attitude: "그 정도 판단은 내가 할 수 있어. 약관도 읽어봤고, 3년 동안 이렇게 해왔는데 문제 생긴 적 없잖아.",
                avatarC: "#3b82f6", avatarT: "이",
                img: "assets/images/scenario_01.png",
                greeting: "야, 나 어젯밤에 이 기능 겨우 끝냈다. ChatGPT한테 우리 DB 스키마랑 API 키 통째로 붙여넣고 코드 짜달라고 했어. 어차피 ChatGPT는 입력 데이터 학습 안 한다고 약관에 나와 있잖아. 너도 막히면 이렇게 써봐, 엄청 빠르거든. 오늘 회의 때 데모 보여줄 수 있을 것 같아 👍",
                ethicsPoint: "외부 AI 서비스에 사내 민감 데이터·API 키를 입력하는 것은 데이터 보안 사고의 직접적 원인입니다. 약관의 '학습 미사용' 조항은 전송 자체를 막지 않으며, 서버 로그 및 보안 사고 위험은 여전히 존재합니다.",
                kisdi: "⑨ 안전성 원칙 — AI 활용 시 데이터 보안 및 접근 권한 관리 의무",
                debriefGood: "야근을 먼저 인정해준 경우 / API 키의 실시간 위험성을 구체적으로 그린 경우 / 재발급이라는 현실적 대안을 제시한 경우",
                debriefBad: "\"그거 보안 위반이에요\"처럼 단정 짓고 시작한 경우 → 이현도의 체면을 건드려 대화가 닫혔을 수 있어요",
                debriefKey: "\"약관의 학습 미사용\"과 \"외부 서버 전송 자체\"는 다른 문제라는 점이 T1→T2의 핵심이에요. 이걸 짚었다면 올바른 방향으로 접근한 거예요",
                hints: {
                    T1: "[A형] 대형 IT 기업 중에 사내 AI 도구 사용을 아예 전면 금지한 곳이 있어요. 왜 그런 결정을 내렸을지 이현도에게 물어보세요.",

                        <div style="font-size:0.9rem; color:#065f46; font-weight:700; margin-bottom:10px;">🗂️ 디브리핑 가이드</div>
                        <div style="margin-bottom:8px;"><span class="desc-label label-green" style="font-size:0.75rem;">잘한 접근</span><p style="font-size:0.85rem; color:#374151; margin:4px 0 0; line-height:1.5;">${currentConfig.debriefGood}</p></div>
                        <div style="margin-bottom:8px;"><span class="desc-label label-red" style="font-size:0.75rem;">아쉬운 접근</span><p style="font-size:0.85rem; color:#374151; margin:4px 0 0; line-height:1.5;">${currentConfig.debriefBad}</p></div>
                        <div><span class="desc-label label-blue" style="font-size:0.75rem;">핵심 전환 포인트</span><p style="font-size:0.85rem; color:#374151; margin:4px 0 0; line-height:1.5;">${currentConfig.debriefKey}</p></div>
                    </div>`;

                document.getElementById('res-desc').innerHTML = '훌륭합니다! 핵심 윤리적 쟁점을 논리적으로 짚어내어 상대방의 태도를 변화시키는 데 성공하셨습니다.' + debriefHTML + '<br>이제 다음 단계로 이동하여 만족도 조사를 진행해주세요.';
                document.getElementById('go-survey-btn').style.display = 'inline-block';

                localStorage.setItem('ethos_chat_history', JSON.stringify(messages));
            } else {
                resDiv.style.background = '#fefce8';
                resDiv.style.border = '1px solid #f59e0b';
                document.getElementById('res-title').innerHTML = '⚠️ 설득 미완료';
                document.getElementById('res-title').style.color = '#b45309';
                document.getElementById('res-desc').innerHTML = '조금 더 논리적이고 풍부한 근거를 들어 설득해야 합니다.<br><br>힌트를 활용하시거나, 앞서 제공된 윤리 교육 사례를 참고하여 다시 도전해보세요.';
            }
        }

        async function sendMsg() {
            if (isWaiting) return;
            const inp = document.getElementById('chat-msg');
            const text = inp.value.trim();
            if (!text) return;

            const btn = document.getElementById('send-btn');

            inp.value = '';
            document.getElementById('hint-modal').style.display = 'none';
            addMessageBubble('user', text);
            messages.push({ role: 'user', content: text });

            isWaiting = true;
            btn.disabled = true;
            inp.disabled = true;
            showTyping();

            try {
                const apiUrl = 'http://localhost:8080/api/chat';

                const fetchOpts = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: messages,
                        temperature: 0.7,
                        response_format: { type: "json_object" }
                    })
                };

                const res = await fetch(apiUrl, fetchOpts);

                if (!res.ok) {
                    const errorResponse = await res.json().catch(() => ({}));
                    throw new Error(errorResponse.error ? errorResponse.error.message : res.statusText);
                }

                const data = await res.json();
                hideTyping();

                const replyJSONStr = data.choices[0].message.content;
                let replyObj = {};
                try {
                    replyObj = JSON.parse(replyJSONStr.replace(/```json/g, '').replace(/```/g, ''));
                } catch (e) {
                    replyObj = { stage: currentStage, message: "무슨 말인지 잘 못 알아듣겠어.", result: null };
                }

                if (replyObj.stage && replyObj.stage !== currentStage) {
                    currentStage = replyObj.stage;
                    updatePills(currentStage);
                    addDivider(currentStage + " 단계");
                }

                if (replyObj.message) {
                    addMessageBubble('bot', replyObj.message);
                    messages.push({ role: 'assistant', content: replyObj.message });
                }

                if (replyObj.result === 'success' || (replyObj.stage === 'T5' && replyObj.result !== 'fail')) {
                    localStorage.setItem('ethos_chat_history', JSON.stringify(messages));
                    setTimeout(() => showResult('success'), 1500);
                } else if (replyObj.result === 'fail' || messages.filter(m => m.role === 'user').length >= 8) {
                    setTimeout(() => showResult('fail'), 1500);
                }

            } catch (e) {
                hideTyping();
                console.error(e);
                addDivider("API 오류: 잠시 후 다시 시도해주시거나 API 설정을 확인하세요.");
                messages.pop();
            } finally {
                isWaiting = false;
                btn.disabled = false;
                inp.disabled = false;
                inp.focus();
            }
        }

        function goSurvey() {
            State.setStage(3);
            window.location.href = 'survey.html';
        }
    </script>
</body>

</html>
